<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f5f5f7">
<title>LifeAsset — 持ち物管理</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #f5f5f7;
–card: #ffffff;
–nav-bg: rgba(255,255,255,0.85);
–border: rgba(0,0,0,0.08);
–text: #1d1d1f;
–text2: #6e6e73;
–text3: #aeaeb2;
–green: #34c759;
–yellow: #ff9f0a;
–red: #ff3b30;
–blue: #0071e3;
–seg-bg: #e5e5ea;
–divider: #f2f2f7;
}

html { background: var(–bg); }
body {
background: var(–bg);
color: var(–text);
font-family: ‘Outfit’, -apple-system, ‘Hiragino Sans’, sans-serif;
min-height: 100vh;
-webkit-font-smoothing: antialiased;
overscroll-behavior-y: none;
}

/* NAV */
.nav {
position: sticky; top: 0; z-index: 200;
background: var(–nav-bg);
backdrop-filter: saturate(180%) blur(20px);
-webkit-backdrop-filter: saturate(180%) blur(20px);
border-bottom: 1px solid var(–border);
padding-top: env(safe-area-inset-top, 0px);
}
.nav-inner {
display: flex; align-items: center; justify-content: space-between;
padding: 12px 20px; height: 52px;
}
.nav-title { font-size: 17px; font-weight: 700; color: var(–text); letter-spacing: -0.3px; }
.nav-add {
background: var(–blue); color: #fff; border: none;
border-radius: 980px; padding: 7px 16px;
font-size: 13px; font-weight: 600; font-family: inherit;
cursor: pointer; display: flex; align-items: center; gap: 4px;
}

/* MAIN TABS */
.main-tabs {
display: flex; gap: 0; padding: 0 16px 0;
border-bottom: 1px solid var(–border);
background: var(–nav-bg);
backdrop-filter: saturate(180%) blur(20px);
-webkit-backdrop-filter: saturate(180%) blur(20px);
}
.main-tab {
flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
padding: 10px 0; border: none; background: transparent;
color: var(–text2); font-size: 14px; font-weight: 600; font-family: inherit;
cursor: pointer;
border-bottom: 2px solid transparent; margin-bottom: -1px;
transition: color .15s, border-color .15s;
}
.main-tab.active { color: var(–blue); border-bottom-color: var(–blue); }
.tab-badge {
font-size: 11px; padding: 1px 7px; border-radius: 20px;
background: var(–seg-bg); color: var(–text2); font-weight: 700;
transition: all .15s;
}
.main-tab.active .tab-badge { background: var(–blue); color: #fff; }

/* PAGE */
.page { max-width: 640px; margin: 0 auto; padding: 20px 16px 100px; }

/* HERO */
.hero { margin-bottom: 24px; }
.hero-eyebrow { font-size: 12px; color: var(–text2); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 6px; }
.hero-h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 4px; }
.hero-sub { font-size: 15px; color: var(–text2); }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.stat {
background: var(–card); border-radius: 16px;
padding: 14px 16px;
box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
}
.stat-label { font-size: 11px; color: var(–text2); font-weight: 500; margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

/* ALERT */
.alert-banner {
background: #fff8ec; border: 1px solid #ffd580;
border-radius: 14px; padding: 12px 14px; margin-bottom: 20px;
display: flex; gap: 10px; align-items: flex-start;
}
.alert-title { font-size: 13px; font-weight: 700; color: #3a1a00; margin-bottom: 3px; }
.alert-text { font-size: 12px; color: #7c4700; line-height: 1.7; }

/* TOOLBAR */
.toolbar {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 16px; gap: 10px; flex-wrap: wrap;
}
.seg { display: flex; background: var(–seg-bg); border-radius: 9px; padding: 2px; gap: 2px; }
.seg-btn {
border: none; border-radius: 7px; padding: 5px 14px;
font-size: 13px; font-weight: 600; cursor: pointer;
background: transparent; color: var(–text2);
transition: all .15s; font-family: inherit;
}
.seg-btn.on { background: var(–card); color: var(–text); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
.sort-sel {
background: var(–card); border: 1px solid #d2d2d7;
border-radius: 9px; padding: 6px 10px;
font-size: 13px; color: var(–text); font-family: inherit; outline: none;
}

/* GRID */
.grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
@media(min-width:560px){ .grid { grid-template-columns: 1fr 1fr; } }

/* CARD */
.card {
background: var(–card); border-radius: 20px; overflow: hidden;
box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.05);
border: 1.5px solid transparent;
transition: transform .18s, box-shadow .18s;
cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card.urgent { border-color: #ffd580; }
.card-accent { height: 4px; }
.card-body { padding: 16px 18px 18px; }
.card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.card-icon {
width: 42px; height: 42px; border-radius: 12px;
background: var(–bg); display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.card-info { margin-left: 11px; flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-maker { font-size: 11px; color: var(–text2); margin-top: 2px; }
.card-price { font-size: 13px; font-weight: 600; color: var(–text2); white-space: nowrap; padding-left: 8px; }
.divider { height: 1px; background: var(–divider); margin-bottom: 14px; }

/* SECTIONS */
.sec { background: var(–divider); border-radius: 12px; padding: 11px 13px; margin-bottom: 10px; }
.sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.sec-label { font-size: 12px; color: var(–text2); font-weight: 600; }
.sec-sub { font-size: 11px; color: var(–text3); margin-top: 3px; }

/* BADGE */
.badge {
display: inline-flex; align-items: center; gap: 4px;
border-radius: 980px; padding: 3px 9px;
font-size: 11px; font-weight: 700;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* HP BAR */
.hp-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-top: 10px; margin-bottom: 5px; }
.hp-track { height: 6px; background: var(–seg-bg); border-radius: 3px; overflow: hidden; }
.hp-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.hp-caption { font-size: 10px; color: var(–text3); text-align: right; margin-top: 3px; }
.card-note { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(–divider); font-size: 11px; color: var(–text3); }

/* EMPTY */
.empty { text-align: center; padding: 60px 0; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(–text2); }

/* MODAL OVERLAY */
.overlay {
position: fixed; inset: 0; z-index: 500;
background: rgba(0,0,0,0.45);
backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
display: flex; align-items: flex-end; justify-content: center;
opacity: 0; pointer-events: none;
transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

/* SHEET */
.sheet {
background: var(–card);
border-radius: 22px 22px 0 0;
width: 100%; max-width: 600px;
max-height: 92vh; overflow-y: auto;
padding: 12px 22px calc(env(safe-area-inset-bottom, 0px) + 28px);
transform: translateY(100%);
transition: transform .28s cubic-bezier(.32,1,.23,1);
-webkit-overflow-scrolling: touch;
}
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle {
width: 36px; height: 4px; background: #d2d2d7;
border-radius: 2px; margin: 0 auto 22px;
}
.sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 22px; }

/* FORM */
.f-group { margin-bottom: 15px; }
.f-label { display: block; font-size: 12px; font-weight: 700; color: var(–text2); margin-bottom: 5px; letter-spacing: 0.2px; }
.f-input {
width: 100%; background: var(–bg); border: 1.5px solid transparent;
border-radius: 11px; padding: 11px 13px; font-size: 16px; color: var(–text);
outline: none; transition: border-color .15s; font-family: inherit;
-webkit-appearance: none; appearance: none;
}
.f-input:focus { border-color: var(–blue); background: #fff; }
.f-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn-primary {
flex: 1; background: var(–blue); color: #fff; border: none;
border-radius: 13px; padding: 14px; font-size: 16px; font-weight: 700;
font-family: inherit; cursor: pointer;
}
.btn-danger {
background: #fff0f0; color: var(–red);
border: 1.5px solid #ffd4d1; border-radius: 13px;
padding: 14px 18px; font-size: 15px; font-weight: 700;
font-family: inherit; cursor: pointer;
}

/* BOTTOM SAFE AREA */
.bottom-safe { height: env(safe-area-inset-bottom, 0px); }
</style>

</head>

<script>
// ── DATA ────────────────────────────────────────────────
const APPLIANCE_CAT = {
  "冷蔵庫":["❄️",10],"洗濯機":["🫧",10],"エアコン":["💨",10],"テレビ":["📺",8],
  "電子レンジ":["📡",10],"炊飯器":["🍚",10],"掃除機":["🌀",7],"食洗機":["🍽️",10],
  "乾燥機":["🌡️",8],"温水洗浄便座":["🚽",10],"照明":["💡",10],"スピーカー":["🔊",10],
  "プロジェクター":["🎥",8],"ロボット掃除機":["🤖",7],"給湯器":["🔥",15],"その他（家電）":["🔌",8]
};
const PERSONAL_CAT = {
  "スマートフォン":["📱",4],"ノートPC":["💻",5],"タブレット":["⬜",5],"スマートウォッチ":["⌚",3],
  "カメラ":["📷",7],"イヤホン":["🎧",3],"財布":["👛",5],"バッグ":["👜",8],
  "時計":["🕐",15],"自転車":["🚲",8],"楽器":["🎸",20],"その他（身の回り）":["🎒",5]
};

const TABS = {
  appliance: { label:"家電", icon:"🏠", cats: APPLIANCE_CAT },
  personal:  { label:"身の回り品", icon:"🎒", cats: PERSONAL_CAT }
};

const SAMPLE = [
  {id:1,tab:"appliance",name:"ドラム式洗濯機",category:"洗濯機",maker:"Panasonic",model:"NA-VX900BL",purchaseDate:"2020-03-15",warrantyYears:1,extWarranty:5,lifespanYears:10,price:180000,notes:"延長保証あり"},
  {id:2,tab:"appliance",name:"4Kテレビ 65インチ",category:"テレビ",maker:"Sony",model:"KJ-65X9000J",purchaseDate:"2021-06-01",warrantyYears:1,extWarranty:3,lifespanYears:8,price:250000,notes:""},
  {id:3,tab:"appliance",name:"冷蔵庫 500L",category:"冷蔵庫",maker:"日立",model:"R-HW54S",purchaseDate:"2019-11-20",warrantyYears:1,extWarranty:0,lifespanYears:10,price:150000,notes:""},
  {id:4,tab:"appliance",name:"エアコン リビング",category:"エアコン",maker:"Daikin",model:"AN56YRS",purchaseDate:"2018-07-10",warrantyYears:1,extWarranty:5,lifespanYears:10,price:120000,notes:""},
  {id:5,tab:"appliance",name:"電子レンジ",category:"電子レンジ",maker:"Panasonic",model:"NE-BS807",purchaseDate:"2017-02-28",warrantyYears:1,extWarranty:0,lifespanYears:10,price:45000,notes:""},
  {id:6,tab:"personal",name:"iPhone 15 Pro",category:"スマートフォン",maker:"Apple",model:"A3101",purchaseDate:"2023-09-22",warrantyYears:1,extWarranty:2,lifespanYears:4,price:159800,notes:"AppleCare+ 加入済"},
  {id:7,tab:"personal",name:"MacBook Pro 14",category:"ノートPC",maker:"Apple",model:"M3 Pro",purchaseDate:"2023-11-07",warrantyYears:1,extWarranty:3,lifespanYears:5,price:298000,notes:""},
  {id:8,tab:"personal",name:"AirPods Pro",category:"イヤホン",maker:"Apple",model:"第2世代",purchaseDate:"2022-10-18",warrantyYears:1,extWarranty:0,lifespanYears:3,price:39800,notes:""},
];

// ── STATE ────────────────────────────────────────────────
let items = [];
let activeTab = 'appliance';
let filter = 'all';
let editingId = null;

// ── STORAGE ──────────────────────────────────────────────
function load() {
  try {
    const d = localStorage.getItem('life-asset-v1');
    items = d ? JSON.parse(d) : JSON.parse(JSON.stringify(SAMPLE));
  } catch { items = JSON.parse(JSON.stringify(SAMPLE)); }
}
function save() {
  try { localStorage.setItem('life-asset-v1', JSON.stringify(items)); } catch {}
}

// ── STATUS CALC ──────────────────────────────────────────
function getStatus(item) {
  const today = new Date();
  const purchase = new Date(item.purchaseDate);
  const msMonth = 1000*60*60*24*30.5;
  const msYear = msMonth*12;
  const yearsOwned = (today - purchase) / msYear;
  const totalW = item.extWarranty > 0 ? item.extWarranty : item.warrantyYears;
  const wEnd = new Date(purchase); wEnd.setFullYear(wEnd.getFullYear() + totalW);
  const mToW = (wEnd - today) / msMonth;
  const lEnd = new Date(purchase); lEnd.setFullYear(lEnd.getFullYear() + item.lifespanYears);
  const yToL = (lEnd - today) / msYear;
  const lPct = Math.min(yearsOwned / item.lifespanYears * 100, 100);

  let ws = 'safe';
  if (mToW < 0) ws = 'expired';
  else if (mToW <= 1) ws = 'critical';
  else if (mToW <= 3) ws = 'warning';

  let ls = 'safe';
  if (yToL < 0) ls = 'overdue';
  else if (yToL <= 1) ls = 'warning';

  const wLabel = ws==='expired' ? '期限切れ'
    : mToW<1 ? `残${Math.ceil(mToW*30)}日`
    : `残${Math.ceil(mToW)}ヶ月`;

  return { ws, ls, wLabel, lPct, mToW, yToL, wEnd, lEnd, yearsOwned };
}

const STATUS_STYLE = {
  safe:     {color:'#34c759', bg:'#f0fdf4', text:'#166534'},
  warning:  {color:'#ff9f0a', bg:'#fffbeb', text:'#92400e'},
  critical: {color:'#ff3b30', bg:'#fff1f0', text:'#991b1b'},
  expired:  {color:'#8e8e93', bg:'#f2f2f7', text:'#3a3a3c'},
  overdue:  {color:'#ff3b30', bg:'#fff1f0', text:'#991b1b'},
};

function badge(status, label) {
  const s = STATUS_STYLE[status] || STATUS_STYLE.safe;
  return `<span class="badge" style="background:${s.bg};color:${s.text}">
    <span class="badge-dot" style="background:${s.color}"></span>${label}
  </span>`;
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const sortBy = document.getElementById('sort-sel').value;
  const cats = TABS[activeTab].cats;

  // tab counts
  ['appliance','personal'].forEach(t => {
    document.getElementById(`badge-${t}`).textContent = items.filter(i=>i.tab===t).length;
  });

  // global stats
  const allAlerts = items.filter(i => { const s=getStatus(i); return s.ws!=='safe'||s.ls!=='safe'; });
  document.getElementById('stat-total').textContent = items.length + '点';
  const aEl = document.getElementById('stat-alert');
  aEl.textContent = allAlerts.length + '件';
  aEl.style.color = allAlerts.length > 0 ? 'var(--yellow)' : 'var(--green)';
  const total = items.reduce((s,i)=>s+(i.price||0),0);
  document.getElementById('stat-asset').textContent = '¥' + Math.round(total/10000) + '万';

  // tab items
  let tabItems = items.filter(i => i.tab === activeTab);
  const tabAlerts = tabItems.filter(i => { const s=getStatus(i); return s.ws!=='safe'||s.ls!=='safe'; });

  // alert banner
  const banner = document.getElementById('alert-banner');
  if (tabAlerts.length > 0) {
    banner.style.display = 'flex';
    document.getElementById('alert-title').textContent = `要確認が ${tabAlerts.length}件 あります`;
    document.getElementById('alert-text').innerHTML = tabAlerts.map(a => {
      const s = getStatus(a); const r = [];
      if (s.ws !== 'safe') r.push(`補償${s.wLabel}`);
      if (s.ls === 'overdue') r.push('耐用超過');
      else if (s.ls === 'warning') r.push('耐用1年前');
      const icon = (cats[a.category]||['📦'])[0];
      return `<span style="display:inline-block;margin-right:12px">${icon} ${a.name}（${r.join('・')}）</span>`;
    }).join('');
  } else {
    banner.style.display = 'none';
  }

  // filter
  if (filter === 'warning') tabItems = tabAlerts;

  // filter buttons
  document.getElementById('filter-all').className = 'seg-btn' + (filter==='all'?' on':'');
  document.getElementById('filter-warning').className = 'seg-btn' + (filter==='warning'?' on':'');
  document.getElementById('filter-warning').textContent = `要確認 ${tabAlerts.length}`;
  document.getElementById('filter-all').textContent = `すべて ${items.filter(i=>i.tab===activeTab).length}`;

  // sort
  tabItems = [...tabItems].sort((a,b) => {
    const sa=getStatus(a), sb=getStatus(b);
    if (sortBy==='warranty') return sa.mToW - sb.mToW;
    if (sortBy==='lifespan') return sa.yToL - sb.yToL;
    return a.name.localeCompare(b.name,'ja');
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (tabItems.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('empty-icon').textContent = TABS[activeTab].icon;
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = tabItems.map(item => {
    const s = getStatus(item);
    const icon = (cats[item.category]||['📦'])[0];
    const urgent = s.ws==='critical'||s.ws==='expired'||s.ls==='overdue';
    const accentColor = urgent ? '#ff3b30' : (s.ws==='warning'||s.ls==='warning') ? '#ff9f0a' : '#34c759';
    const remaining = Math.max(0, 100 - s.lPct);
    const hpColor = remaining>50 ? '#34c759' : remaining>20 ? '#ff9f0a' : '#ff3b30';
    const hpGrad = remaining>50 ? 'linear-gradient(90deg,#34c759,#30d158)'
      : remaining>20 ? 'linear-gradient(90deg,#ff9f0a,#ffd60a)'
      : 'linear-gradient(90deg,#ff3b30,#ff6961)';
    const wSub = item.extWarranty > 0 ? `延長保証 ${item.extWarranty}年` : `メーカー保証 ${item.warrantyYears}年`;
    const wDate = s.wEnd.toLocaleDateString('ja-JP',{year:'numeric',month:'short',day:'numeric'});
    const lDate = s.lEnd.toLocaleDateString('ja-JP',{year:'numeric',month:'short'});
    const priceStr = item.price > 0 ? `¥${(item.price/10000).toFixed(0)}万` : '';

    return `<div class="card${urgent?' urgent':''}" onclick="openEdit(${item.id})">
      <div class="card-accent" style="background:${accentColor}"></div>
      <div class="card-body">
        <div class="card-head">
          <div class="card-icon">${icon}</div>
          <div class="card-info">
            <div class="card-name">${item.name}</div>
            <div class="card-maker">${item.maker}${item.model?' · '+item.model:''}</div>
          </div>
          <div class="card-price">${priceStr}</div>
        </div>
        <div class="divider"></div>
        <div class="sec">
          <div class="sec-head">
            <span class="sec-label">🛡 補償期限</span>
            ${badge(s.ws, s.wLabel)}
          </div>
          <div class="sec-sub">${wSub} · ${wDate}まで</div>
        </div>
        <div class="sec">
          <div class="sec-head">
            <span class="sec-label">⏱ 耐用年数</span>
            ${s.ls!=='safe' ? badge(s.ls, s.ls==='overdue'?'超過中':'1年前') : ''}
          </div>
          <div class="hp-row">
            <span style="color:${hpColor}">残り ${remaining.toFixed(0)}%</span>
            <span style="color:var(--text3)">${s.yearsOwned.toFixed(1)}年 / ${item.lifespanYears}年使用</span>
          </div>
          <div class="hp-track"><div class="hp-fill" style="width:${remaining}%;background:${hpGrad}"></div></div>
          <div class="hp-caption">${s.ls==='overdue' ? '⚠ 耐用年数を超過しています' : `目安 ${lDate}まで`}</div>
        </div>
        ${item.notes ? `<div class="card-note">📝 ${item.notes}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── TABS ─────────────────────────────────────────────────
function switchTab(id) {
  activeTab = id;
  filter = 'all';
  Object.keys(TABS).forEach(t => {
    document.getElementById(`tab-${t}`).className = 'main-tab' + (t===id?' active':'');
  });
  render();
}

function setFilter(f) {
  filter = f;
  render();
}

// ── MODAL ────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  const cats = TABS[activeTab].cats;
  const firstCat = Object.keys(cats)[0];
  populateCategorySelect(activeTab);
  document.getElementById('f-category').value = firstCat;
  document.getElementById('f-name').value = '';
  document.getElementById('f-maker').value = '';
  document.getElementById('f-model').value = '';
  document.getElementById('f-purchaseDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-price').value = '';
  document.getElementById('f-warranty').value = 1;
  document.getElementById('f-ext-warranty').value = 0;
  document.getElementById('f-lifespan').value = cats[firstCat][1];
  document.getElementById('f-notes').value = '';
  document.getElementById('sheet-title').textContent = `${TABS[activeTab].icon} ${TABS[activeTab].label}を追加`;
  document.getElementById('btn-save').textContent = '追加する';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 350);
}

function openEdit(id) {
  editingId = id;
  const item = items.find(i => i.id === id);
  if (!item) return;
  populateCategorySelect(item.tab);
  document.getElementById('f-category').value = item.category;
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-maker').value = item.maker || '';
  document.getElementById('f-model').value = item.model || '';
  document.getElementById('f-purchaseDate').value = item.purchaseDate;
  document.getElementById('f-price').value = item.price || '';
  document.getElementById('f-warranty').value = item.warrantyYears;
  document.getElementById('f-ext-warranty').value = item.extWarranty;
  document.getElementById('f-lifespan').value = item.lifespanYears;
  document.getElementById('f-notes').value = item.notes || '';
  document.getElementById('sheet-title').textContent = '✏️ 編集';
  document.getElementById('btn-save').textContent = '変更を保存';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function populateCategorySelect(tabId) {
  const cats = TABS[tabId].cats;
  const sel = document.getElementById('f-category');
  sel.innerHTML = Object.entries(cats).map(([k,v]) =>
    `<option value="${k}">${v[0]} ${k}</option>`
  ).join('');
}

function onCategoryChange() {
  const tab = editingId ? items.find(i=>i.id===editingId)?.tab || activeTab : activeTab;
  const cats = TABS[tab].cats;
  const cat = document.getElementById('f-category').value;
  if (cats[cat]) document.getElementById('f-lifespan').value = cats[cat][1];
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-purchaseDate').value;
  if (!name || !date) { alert('名前と購入日は必須です'); return; }

  const form = {
    tab: editingId ? items.find(i=>i.id===editingId).tab : activeTab,
    category: document.getElementById('f-category').value,
    name,
    maker: document.getElementById('f-maker').value.trim(),
    model: document.getElementById('f-model').value.trim(),
    purchaseDate: date,
    price: Number(document.getElementById('f-price').value) || 0,
    warrantyYears: Number(document.getElementById('f-warranty').value) || 1,
    extWarranty: Number(document.getElementById('f-ext-warranty').value) || 0,
    lifespanYears: Number(document.getElementById('f-lifespan').value) || 5,
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (editingId) {
    items = items.map(i => i.id === editingId ? {...form, id: editingId} : i);
  } else {
    items.push({...form, id: Date.now()});
  }
  save(); closeModal(); render();
}

function deleteItem() {
  if (!editingId) return;
  if (!confirm('削除しますか？')) return;
  items = items.filter(i => i.id !== editingId);
  save(); closeModal(); render();
}

// ── INIT ─────────────────────────────────────────────────
load();
render();
</script>

</body>
</html>
